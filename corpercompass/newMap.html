<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Map</title>
    <link rel="stylesheet" href="newMap.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <main>
      <h1>Interactive Map</h1>

      <div class="controls">
        <div class="search-box">
          <select name="" id="state-select">
            <option value="">Select State</option>
            <!-- Populate with Nigerian states via JS -->
          </select>

          <select name="" id="lga-select" disabled>
            <option value="">Select LGA</option>
          </select>

          <button id="zome-to-location">Zoom to Location</button>
        </div>

        <button id="show-markers">Show Markers</button>
        <button id="show-heatmap">Show Heatmap</button>
        <button id="clear-overlay">Clear Overlays</button>
      </div>

      <div id="map"></div>
    </main>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module" src="newApi.js"></script>
  </body>
</html>
